name: Database Migration Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
      - 'database/**'
      - '.github/workflows/db-migration-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration files syntax
        run: |
          # マイグレーションファイルの存在確認
          if [ -d "supabase/migrations" ] && [ "$(ls -A supabase/migrations/*.sql 2>/dev/null)" ]; then
            echo "✅ Migration files found"
            # 基本的なSQL構文チェック（PostgreSQL）
            for file in supabase/migrations/*.sql; do
              echo "Checking $file..."
              # SQLファイルが空でないことを確認
              if [ ! -s "$file" ]; then
                echo "❌ Error: $file is empty"
                exit 1
              fi
              # 基本的な構文エラーをチェック（簡単な検証）
              if grep -q "CREATE\|ALTER\|DROP\|INSERT\|UPDATE\|DELETE" "$file"; then
                echo "✅ $file contains valid SQL keywords"
              else
                echo "⚠️ Warning: $file may not contain valid SQL statements"
              fi
            done
          else
            echo "ℹ️ No migration files found, skipping check"
          fi

      - name: Validate database schema files
        if: hashFiles('database/**/*.sql') != ''
        run: |
          echo "Checking database schema files..."
          # databaseディレクトリ内のSQLファイルの存在確認
          if [ -d "database" ]; then
            echo "✅ Database directory found"
            # SQLファイルの基本的な検証
            find database -name "*.sql" -type f | while read file; do
              echo "Checking $file..."
              if [ ! -s "$file" ]; then
                echo "❌ Error: $file is empty"
                exit 1
              fi
            done
          fi

